<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Manan Rastogi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #08090A;
      color: #F4F5F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 5rem; font-weight: 700; opacity: 0.2; }
    p { margin-top: 1rem; color: #A7ADB2; font-size: 1.1rem; }
    a {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: rgba(56, 189, 248, 0.15);
      color: #38BDF8;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background 0.2s;
    }
    a:hover { background: rgba(56, 189, 248, 0.25); }
  </style>
  <!-- SPA redirect for GitHub Pages -->
  <script>
    // Redirect to index with path preserved as query
    var pathSegmentsToKeep = 1; // /portfolio/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist.</p>
    <a href="/portfolio/">Go home</a>
  </div>
</body>
</html>
